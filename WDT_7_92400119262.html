<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">

  <div id="signin-box" class="card shadow-sm p-4" style="width:100%;max-width:400px;">
    <h4 class="mb-4 fw-semibold">Sign In</h4>

    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" class="form-control"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control"/>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="remember"/>
      <label class="form-check-label" for="remember">Remember me</label>
    </div>

    <button class="btn btn-dark w-100">Sign In</button>

    <p class="text-center text-muted mt-3 mb-0" style="font-size:.875rem;">
      No account? <a href="#" class="text-dark" onclick="toggle(); return false;">Register</a>
    </p>
  </div>

  <div id="register-box" class="card shadow-sm p-4" style="width:100%;max-width:400px;display:none;">
    <h4 class="mb-4 fw-semibold">Create Account</h4>

    <div class="row mb-3">
      <div class="col">
        <label class="form-label">First name</label>
        <input type="text" class="form-control"/>
      </div>
      <div class="col">
        <label class="form-label">Last name</label>
        <input type="text" class="form-control"/>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" class="form-control"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Confirm Password</label>
      <input type="password" class="form-control"/>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="terms"/>
      <label class="form-check-label" for="terms">
        I agree to the <a href="#" class="text-dark">Terms &amp; Conditions</a>
      </label>
    </div>

    <button class="btn btn-dark w-100">Register</button>

    <p class="text-center text-muted mt-3 mb-0" style="font-size:.875rem;">
      Already have an account? <a href="#" class="text-dark" onclick="toggle(); return false;">Sign In</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggle() {
      const s = document.getElementById('signin-box');
      const r = document.getElementById('register-box');
      s.style.display = s.style.display === 'none' ? '' : 'none';
      r.style.display = r.style.display === 'none' ? '' : 'none';
    }
  </script>
</body>
</html>
